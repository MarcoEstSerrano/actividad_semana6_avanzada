<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Validación Asíncrona de Usuario</title>
        <style>
            body {
                font-family: sans-serif;
                padding: 20px;
            }
            .error {
                color: #d9534f;
                font-weight: bold;
            }
            .success {
                color: #5cb85c;
                font-weight: bold;
            }
            .loading {
                color: #0275d8;
                font-style: italic;
            }
            #resultado {
                margin-top: 20px;
                padding: 15px;
                border: 2px dashed #ccc;
            }
        </style>
    </head>
    <body>

        <h2>Validación de Usuario</h2>

        <form id="userForm">
            <input type="text" id="nombre" placeholder="Nombre de usuario"><br><br>
            <input type="number" id="edad" placeholder="Edad"><br><br>
            <button type="button" onclick="iniciarProceso()">Ejecutar Validación</button>
        </form>

        <div id="resultado">Esperando interacción...</div>

        <script>
            // --- 1. EL CALLBACK (Validación Síncrona inicial) ---
            // Azaustre menciona que antes de la promesa, los datos fluyen
            // por funciones. Aquí validamos campos vacíos.
            function procesarFormulario(nombre, edad, callback) {
                if (nombre.trim() === "" || edad === "") {
                    document.getElementById('resultado').innerHTML =
                            "<span class='error'>[Error] Faltan datos obligatorios.</span>";
                    return;
                }
                callback(edad);
            }

            // LA PROMESA
            // Basado en el ejemplo de Carlos [00:05:24]: 
            // Usamos 'resolve' para el éxito y 'reject' para el error.
            function validarEdadAsync(edad) {
                return new Promise((resolve, reject) => {
                    // Estado "Loading" (Bonus del examen)
                    document.getElementById('resultado').innerHTML =
                            "<span class='loading'>Consultando al servidor...</span>";

                    // Simulamos el delay que explica Carlos [00:02:59]
                    setTimeout(() => {
                        const numEdad = parseInt(edad);

                        // Cláusula de cierre: Primero el error, como sugiere Carlos [00:06:04]
                        if (numEdad <= 0) {
                            reject("La edad ingresada no es válida (debe ser mayor que cero).");
                        } else {
                            resolve(numEdad); // Éxito
                        }
                    }, 2000);
                });
            }

            // ASYNC / AWAIT 
            // Carlos explica que esto hace que el código parezca secuencial [00:09:18]
            async function iniciarProceso() {
                const nombre = document.getElementById('nombre').value;
                const edad = document.getElementById('edad').value;
                const divResultado = document.getElementById('resultado');

                // Ejecutamos el flujo
                procesarFormulario(nombre, edad, async (edadValidada) => {
                    try {
                        // El 'await' detiene la ejecución hasta que la promesa se resuelve [00:09:51]
                        const edadFinal = await validarEdadAsync(edadValidada);

                        if (edadFinal >= 18) {
                            estatus = "es Mayor de edad";
                        } else {
                            estatus = "es Menor de edad";
                        }

                        // Manipulación dinámica del DOM
                        divResultado.innerHTML = `
                            <div class='success'>
                                <strong>¡Validación Exitosa!</strong><br>
                                Usuario: ${nombre}<br>
                                Resultado: ${estatus}
                            </div>`;

                    } catch (error) {
                        // El 'catch' captura el 'reject' de la promesa [00:11:01]
                        divResultado.innerHTML = `<span class='error'>[Servidor] ${error}</span>`;
                    }
                });
            }
        </script>
    </body>
</html>
